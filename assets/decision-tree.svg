<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 740" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1420"/>
      <stop offset="100%" stop-color="#161c2e"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/></filter>
    <marker id="m" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5a7a9a"/>
    </marker>
  </defs>

  <rect width="820" height="740" rx="12" fill="url(#bg)"/>

  <text x="410" y="28" text-anchor="middle" fill="#6a7d9a" font-size="10" font-weight="600" letter-spacing="3">AGENT LOOP · DECISION TREE</text>

  <!-- Legend -->
  <rect x="560" y="48" width="12" height="12" rx="3" fill="#0098db" fill-opacity="0.25" stroke="#0098db" stroke-width="1"/>
  <text x="578" y="59" fill="#6a7d9a" font-size="8">decision</text>
  <rect x="628" y="48" width="12" height="12" rx="2" fill="#1a2845" stroke="#2a5a8a" stroke-width="1"/>
  <text x="646" y="59" fill="#6a7d9a" font-size="8">action</text>
  <rect x="696" y="48" width="12" height="12" rx="6" fill="#1a2a1a" stroke="#3a6a3a" stroke-width="1"/>
  <text x="714" y="59" fill="#6a7d9a" font-size="8">result</text>

  <!-- Ollama response -->
  <rect x="320" y="52" width="180" height="34" rx="6" fill="#1e3050" stroke="#2a5a8a" stroke-width="1" filter="url(#sh)"/>
  <text x="410" y="68" text-anchor="middle" fill="#7a9ac0" font-size="10" font-weight="600">Ollama response</text>
  <text x="410" y="81" text-anchor="middle" fill="#5a7a9a" font-size="7">content + tool_calls?</text>

  <!-- Arrow down -->
  <line x1="410" y1="86" x2="410" y2="106" stroke="#5a7a9a" stroke-width="1" marker-end="url(#m)"/>

  <!-- Diamond: has tool calls -->
  <polygon points="410,108 480,128 410,148 340,128" fill="#0098db" fill-opacity="0.08" stroke="#0098db" stroke-width="1" filter="url(#sh)"/>
  <text x="410" y="132" text-anchor="middle" fill="#0098db" font-size="8" font-weight="600">tool_calls?</text>

  <!-- Yes branch (right) -->
  <line x1="480" y1="128" x2="530" y2="128" stroke="#5aaa5a" stroke-width="1" marker-end="url(#m)"/>
  <text x="505" y="123" text-anchor="middle" fill="#5aaa5a" font-size="7" font-weight="600">yes</text>

  <rect x="532" y="110" width="130" height="36" rx="6" fill="#1a2a1a" fill-opacity="0.2" stroke="#3a6a3a" stroke-width="1"/>
  <text x="597" y="126" text-anchor="middle" fill="#5aaa5a" font-size="9" font-weight="600">Execute tool</text>
  <text x="597" y="140" text-anchor="middle" fill="#4a7a4a" font-size="7">stream chunks · store memory</text>

  <line x1="597" y1="146" x2="597" y2="170" stroke="#5a7a9a" stroke-width="1"/>
  <line x1="597" y1="170" x2="410" y2="170" stroke="#5a7a9a" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="410" y1="170" x2="410" y2="52" stroke="#5a7a9a" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#m)"/>
  <text x="410" y="165" text-anchor="middle" fill="#5a7a9a" font-size="7">loop (max 15)</text>

  <!-- No branch (down from diamond) -->
  <line x1="410" y1="148" x2="410" y2="170" stroke="#ef4444" stroke-width="1" marker-end="url(#m)"/>
  <text x="420" y="162" fill="#ef4444" font-size="7" font-weight="600">no</text>

  <!-- Diamond: has content -->
  <polygon points="410,172 470,190 410,208 350,190" fill="#0098db" fill-opacity="0.08" stroke="#0098db" stroke-width="1" filter="url(#sh)"/>
  <text x="410" y="193" text-anchor="middle" fill="#0098db" font-size="8" font-weight="600">content?</text>

  <!-- Yes branch -->
  <line x1="470" y1="190" x2="510" y2="190" stroke="#5aaa5a" stroke-width="1" marker-end="url(#m)"/>
  <text x="490" y="185" text-anchor="middle" fill="#5aaa5a" font-size="7" font-weight="600">yes</text>

  <rect x="512" y="172" width="140" height="36" rx="6" fill="#1a2845" fill-opacity="0.2" stroke="#2a5a8a" stroke-width="1"/>
  <text x="582" y="188" text-anchor="middle" fill="#7a9ac0" font-size="9" font-weight="600">Classify response</text>
  <text x="582" y="202" text-anchor="middle" fill="#5a7a9a" font-size="7">greeting? advisory? giving up?</text>

  <line x1="582" y1="208" x2="582" y2="230" stroke="#5a7a9a" stroke-width="1" marker-end="url(#m)"/>

  <!-- Greeting check -->
  <polygon points="582,232 640,250 582,268 524,250" fill="#0098db" fill-opacity="0.06" stroke="#0098db" stroke-width="1"/>
  <text x="582" y="253" text-anchor="middle" fill="#0098db" font-size="7" font-weight="600">greeting?</text>

  <line x1="640" y1="250" x2="680" y2="250" stroke="#5aaa5a" stroke-width="1" marker-end="url(#m)"/>
  <text x="660" y="245" text-anchor="middle" fill="#5aaa5a" font-size="6">yes</text>

  <rect x="682" y="235" width="64" height="30" rx="12" fill="#1a2a1a" fill-opacity="0.2" stroke="#3a6a3a" stroke-width="1"/>
  <text x="714" y="254" text-anchor="middle" fill="#5aaa5a" font-size="8" font-weight="600">yield</text>

  <!-- Not greeting → success check -->
  <line x1="582" y1="268" x2="582" y2="290" stroke="#ef4444" stroke-width="1" marker-end="url(#m)"/>
  <text x="592" y="282" fill="#ef4444" font-size="6">no</text>

  <polygon points="582,292 635,308 582,324 529,308" fill="#0098db" fill-opacity="0.06" stroke="#0098db" stroke-width="1"/>
  <text x="582" y="311" text-anchor="middle" fill="#0098db" font-size="7" font-weight="600">success?</text>

  <line x1="635" y1="308" x2="670" y2="308" stroke="#5aaa5a" stroke-width="1" marker-end="url(#m)"/>
  <rect x="672" y="293" width="60" height="30" rx="12" fill="#1a2a1a" fill-opacity="0.2" stroke="#3a6a3a" stroke-width="1"/>
  <text x="702" y="312" text-anchor="middle" fill="#5aaa5a" font-size="8" font-weight="600">yield</text>

  <!-- Not success → advisory classification -->
  <line x1="582" y1="324" x2="582" y2="348" stroke="#ef4444" stroke-width="1" marker-end="url(#m)"/>

  <rect x="502" y="350" width="160" height="34" rx="6" fill="#1e3050" stroke="#2a5a8a" stroke-width="1"/>
  <text x="582" y="366" text-anchor="middle" fill="#7a9ac0" font-size="9" font-weight="600">Classify advisory</text>
  <text x="582" y="379" text-anchor="middle" fill="#5a7a9a" font-size="7">Ollama + regex fallback</text>

  <line x1="582" y1="384" x2="582" y2="406" stroke="#5a7a9a" stroke-width="1" marker-end="url(#m)"/>

  <!-- forceTool check -->
  <polygon points="582,408 635,424 582,440 529,424" fill="#0098db" fill-opacity="0.06" stroke="#0098db" stroke-width="1"/>
  <text x="582" y="427" text-anchor="middle" fill="#0098db" font-size="7" font-weight="600">forceTool?</text>

  <line x1="635" y1="424" x2="680" y2="424" stroke="#5aaa5a" stroke-width="1" marker-end="url(#m)"/>
  <rect x="682" y="409" width="100" height="30" rx="6" fill="#1e3050" fill-opacity="0.2" stroke="#2a5a8a" stroke-width="1"/>
  <text x="732" y="425" text-anchor="middle" fill="#7a9ac0" font-size="7">re-prompt or yield</text>

  <!-- Not forceTool → priority system -->
  <line x1="582" y1="440" x2="582" y2="464" stroke="#ef4444" stroke-width="1" marker-end="url(#m)"/>

  <rect x="320" y="466" width="524" height="132" rx="8" fill="#1a2845" fill-opacity="0.08" stroke="#2a5a8a" stroke-width="0.5"/>
  <text x="582" y="484" text-anchor="middle" fill="#3a7acc" font-size="9" font-weight="700">FAILURE HANDLING (priority system)</text>

  <!-- P0 -->
  <rect x="332" y="494" width="248" height="28" rx="5" fill="#1e2a38" stroke="#2a5a8a" stroke-width="0.4"/>
  <text x="456" y="512" text-anchor="middle" fill="#7a9ac0" font-size="8"><tspan fill="#cca86a" font-weight="600">P0</tspan>  fabrication without tool  →  askOpenCode</text>

  <!-- P1 -->
  <rect x="332" y="526" width="248" height="28" rx="5" fill="#1e2a38" stroke="#2a5a8a" stroke-width="0.4"/>
  <text x="456" y="544" text-anchor="middle" fill="#7a9ac0" font-size="8"><tspan fill="#cca86a" font-weight="600">P1</tspan>  weak result + advisory/stuck  →  askOpenCode</text>

  <!-- P2 -->
  <rect x="332" y="558" width="248" height="28" rx="5" fill="#1e2a38" stroke="#2a5a8a" stroke-width="0.4"/>
  <text x="456" y="576" text-anchor="middle" fill="#7a9ac0" font-size="8"><tspan fill="#cca86a" font-weight="600">P2</tspan>  advisory  →  FORCE_TOOL_MSG  (stuckCount++)</text>

  <!-- P3 -->
  <rect x="590" y="494" width="242" height="28" rx="5" fill="#1e2a38" stroke="#2a5a8a" stroke-width="0.4"/>
  <text x="711" y="512" text-anchor="middle" fill="#7a9ac0" font-size="8"><tspan fill="#cca86a" font-weight="600">P3</tspan>  weak result  →  PERSIST_MSG</text>

  <!-- P4 -->
  <rect x="590" y="526" width="242" height="28" rx="5" fill="#1e2a38" stroke="#2a5a8a" stroke-width="0.4"/>
  <text x="711" y="544" text-anchor="middle" fill="#7a9ac0" font-size="8"><tspan fill="#cca86a" font-weight="600">P4</tspan>  giving up  →  PERSIST_MSG</text>

  <!-- Yield -->
  <rect x="590" y="558" width="242" height="28" rx="5" fill="#1a2a1a" fill-opacity="0.15" stroke="#3a6a3a" stroke-width="0.4"/>
  <text x="711" y="576" text-anchor="middle" fill="#5aaa5a" font-size="8" font-weight="600">none matched  →  YIELD text response</text>

  <!-- No content branch -->
  <line x1="350" y1="190" x2="180" y2="190" stroke="#ef4444" stroke-width="1" marker-end="url(#m)"/>

  <rect x="40" y="170" width="138" height="40" rx="6" fill="#1e2a38" fill-opacity="0.2" stroke="#2a5a8a" stroke-width="1"/>
  <text x="109" y="188" text-anchor="middle" fill="#7a9ac0" font-size="8" font-weight="600">Empty response</text>
  <text x="109" y="202" text-anchor="middle" fill="#5a7a9a" font-size="7">emptyCount >= 2?</text>

  <line x1="109" y1="210" x2="109" y2="232" stroke="#5a7a9a" stroke-width="1" marker-end="url(#m)"/>

  <polygon points="109,234 148,252 109,270 70,252" fill="#0098db" fill-opacity="0.06" stroke="#0098db" stroke-width="1"/>
  <text x="109" y="255" text-anchor="middle" fill="#0098db" font-size="7" font-weight="600">≥ 2?</text>

  <line x1="148" y1="252" x2="185" y2="252" stroke="#5aaa5a" stroke-width="1" marker-end="url(#m)"/>
  <rect x="40" y="275" width="160" height="28" rx="6" fill="#1e2a38" fill-opacity="0.2" stroke="#2a5a8a" stroke-width="1"/>
  <text x="120" y="293" text-anchor="middle" fill="#7a9ac0" font-size="7">askOpenCode (once)</text>

  <line x1="109" y1="270" x2="109" y2="318" stroke="#ef4444" stroke-width="1" marker-end="url(#m)"/>

  <rect x="40" y="320" width="160" height="28" rx="6" fill="#1e2a38" fill-opacity="0.2" stroke="#2a5a8a" stroke-width="1"/>
  <text x="120" y="338" text-anchor="middle" fill="#7a9ac0" font-size="7">FORCE_TOOL_MSG</text>

  <line x1="109" y1="348" x2="109" y2="370" stroke="#5a7a9a" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="109" y="365" text-anchor="middle" fill="#5a7a9a" font-size="6">loop</text>

  <!-- Bottom: final paths -->
  <line x1="582" y1="598" x2="582" y2="630" stroke="#5a7a9a" stroke-width="1" marker-end="url(#m)"/>
  <line x1="109" y1="370" x2="109" y2="630" stroke="#5a7a9a" stroke-width="1"/>
  <line x1="109" y1="630" x2="582" y2="630" stroke="#5a7a9a" stroke-width="1"/>

  <!-- Max loops gate -->
  <rect x="470" y="632" width="224" height="30" rx="6" fill="#1e2a38" stroke="#ef4444" stroke-width="0.8"/>
  <text x="582" y="651" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="600">loop == 15  →  error (exceeded max iterations)</text>

  <!-- Yield final -->
  <text x="660" y="695" text-anchor="middle" fill="#6a7d9a" font-size="8">All paths that yield (greeting, success, P0/P1, or no failure pattern)</text>
  <text x="660" y="710" text-anchor="middle" fill="#6a7d9a" font-size="8">persist assistant message + tool_results JSON to SQLite</text>

</svg>

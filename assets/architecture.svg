<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1420"/>
      <stop offset="100%" stop-color="#161c2e"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="ar" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0098db" opacity="0.6"/>
    </marker>
    <marker id="ag" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5aaa5a" opacity="0.5"/>
    </marker>
    <marker id="ap" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9a6ae0" opacity="0.5"/>
    </marker>
    <marker id="ad" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#cca86a" opacity="0.5"/>
    </marker>
  </defs>

  <rect width="780" height="520" rx="12" fill="url(#bg)"/>

  <text x="390" y="30" text-anchor="middle" fill="#6a7d9a" font-size="10" font-weight="600" letter-spacing="4">LOCALCLAW · ARCHITECTURE</text>

  <!-- ═══════════ ROW 1 ═══════════ -->

  <!-- Client -->
  <rect x="20" y="50" width="170" height="84" rx="10" fill="#0098db" fill-opacity="0.08" stroke="#0098db" stroke-width="1" filter="url(#sh)"/>
  <text x="105" y="72" text-anchor="middle" fill="#0098db" font-size="11" font-weight="700">CLIENT</text>
  <text x="105" y="90" text-anchor="middle" fill="#8899b8" font-size="9">Angular 20 SPA</text>
  <text x="105" y="106" text-anchor="middle" fill="#6a7d9a" font-size="8">WebSocket streaming</text>
  <text x="105" y="120" text-anchor="middle" fill="#6a7d9a" font-size="8">Widgets · 2 themes</text>

  <!-- Arrow Client ↔ Server -->
  <line x1="190" y1="92" x2="222" y2="92" stroke="#0098db" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="222" y1="80" x2="190" y2="80" stroke="#0098db" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- Express Server -->
  <rect x="224" y="40" width="330" height="196" rx="10" fill="#1a2845" fill-opacity="0.15" stroke="#2a5a8a" stroke-width="1" filter="url(#sh)"/>
  <text x="389" y="60" text-anchor="middle" fill="#3a7acc" font-size="11" font-weight="700">EXPRESS SERVER  :4173</text>

  <!-- Auth -->
  <rect x="238" y="74" width="148" height="42" rx="5" fill="#1e3050" stroke="#2a5a8a" stroke-width="0.6"/>
  <text x="312" y="90" text-anchor="middle" fill="#7a9ac0" font-size="9" font-weight="600">Auth</text>
  <text x="312" y="106" text-anchor="middle" fill="#5a7a9a" font-size="7.5">Bearer token middleware</text>

  <!-- WebSocket -->
  <rect x="394" y="74" width="148" height="42" rx="5" fill="#1e3050" stroke="#2a5a8a" stroke-width="0.6"/>
  <text x="468" y="90" text-anchor="middle" fill="#7a9ac0" font-size="9" font-weight="600">WebSocket</text>
  <text x="468" y="106" text-anchor="middle" fill="#5a7a9a" font-size="7.5">Streaming + keepalive</text>

  <!-- REST API -->
  <rect x="238" y="122" width="304" height="36" rx="5" fill="#1e3050" stroke="#2a5a8a" stroke-width="0.6"/>
  <text x="390" y="138" text-anchor="middle" fill="#7a9ac0" font-size="9" font-weight="600">REST API</text>
  <text x="390" y="152" text-anchor="middle" fill="#5a7a9a" font-size="7.5">sessions · messages · uploads · knowledge · background-tasks</text>

  <!-- Agent Loop -->
  <rect x="238" y="164" width="304" height="38" rx="5" fill="#1a2840" stroke="#0098db" stroke-width="0.8"/>
  <text x="390" y="180" text-anchor="middle" fill="#0098db" font-size="9" font-weight="700">Agent Loop  (max 15 iterations)</text>
  <text x="390" y="194" text-anchor="middle" fill="#5a7a9a" font-size="7.5">Pre-plan · Plan · Function calling · Classifier · Failure handling</text>

  <!-- Sub-modules tags -->
  <rect x="238" y="208" width="72" height="16" rx="3" fill="#142030" stroke="#2a5a8a" stroke-width="0.4"/>
  <text x="274" y="219" text-anchor="middle" fill="#6a8aaa" font-size="7">prompts</text>
  <rect x="314" y="208" width="72" height="16" rx="3" fill="#142030" stroke="#2a5a8a" stroke-width="0.4"/>
  <text x="350" y="219" text-anchor="middle" fill="#6a8aaa" font-size="7">classifier</text>
  <rect x="390" y="208" width="72" height="16" rx="3" fill="#142030" stroke="#2a5a8a" stroke-width="0.4"/>
  <text x="426" y="219" text-anchor="middle" fill="#6a8aaa" font-size="7">planner</text>
  <rect x="466" y="208" width="80" height="16" rx="3" fill="#142030" stroke="#2a5a8a" stroke-width="0.4"/>
  <text x="506" y="219" text-anchor="middle" fill="#6a8aaa" font-size="7">opencode</text>

  <!-- Arrow Server → Ollama -->
  <line x1="554" y1="140" x2="588" y2="140" stroke="#9a6ae0" stroke-width="1" opacity="0.5"/>
  <line x1="588" y1="128" x2="554" y2="128" stroke="#9a6ae0" stroke-width="1" opacity="0.5"/>
  <text x="571" y="138" text-anchor="middle" fill="#9a6ae0" font-size="6" opacity="0.4"/>

  <!-- Ollama -->
  <rect x="590" y="56" width="174" height="82" rx="10" fill="#2a1a3a" fill-opacity="0.25" stroke="#5a3a8a" stroke-width="1" filter="url(#sh)"/>
  <text x="677" y="78" text-anchor="middle" fill="#9a6ae0" font-size="10" font-weight="700">OLLAMA</text>
  <text x="677" y="95" text-anchor="middle" fill="#7a5a9a" font-size="8">Chat LLM   (qwen2.5:3b)</text>
  <text x="677" y="110" text-anchor="middle" fill="#7a5a9a" font-size="8">Embeddings (nomic)</text>
  <text x="677" y="125" text-anchor="middle" fill="#7a5a9a" font-size="8">Image gen  (flux/sd)</text>

  <!-- OpenCode -->
  <rect x="590" y="146" width="174" height="56" rx="10" fill="#1a2a1a" fill-opacity="0.25" stroke="#5a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="677" y="168" text-anchor="middle" fill="#8ab84a" font-size="10" font-weight="700">OPENCODE  CLI</text>
  <text x="677" y="183" text-anchor="middle" fill="#6a8a4a" font-size="8">Pre-planning (2 rounds)</text>
  <text x="677" y="196" text-anchor="middle" fill="#6a8a4a" font-size="8">Dynamic tool (fallback)</text>

  <!-- ═══════════ ROW 2 ═══════════ -->

  <line x1="20" y1="250" x2="764" y2="250" stroke="#2a5a8a" stroke-width="0.5" opacity="0.2"/>

  <!-- Tools -->
  <rect x="20" y="265" width="170" height="126" rx="10" fill="#1a2a1a" fill-opacity="0.25" stroke="#3a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="105" y="287" text-anchor="middle" fill="#5aaa5a" font-size="10" font-weight="700">TOOLS (14 built-in)</text>
  <text x="105" y="304" text-anchor="middle" fill="#3a6a3a" font-size="7.5">web_fetch · fetch_news</text>
  <text x="105" y="318" text-anchor="middle" fill="#3a6a3a" font-size="7.5">weather (widget)</text>
  <text x="105" y="332" text-anchor="middle" fill="#3a6a3a" font-size="7.5">read_file · write_file</text>
  <text x="105" y="346" text-anchor="middle" fill="#3a6a3a" font-size="7.5">run_bash · generate_image</text>
  <text x="105" y="360" text-anchor="middle" fill="#3a6a3a" font-size="7.5">send_email · telegram</text>
  <text x="105" y="374" text-anchor="middle" fill="#3a6a3a" font-size="7.5">schedule_task · opencode_task</text>
  <text x="105" y="388" text-anchor="middle" fill="#3a6a3a" font-size="7.5">create_tool · search_knowledge</text>

  <!-- Scheduler -->
  <rect x="20" y="400" width="170" height="52" rx="10" fill="#1a2a1a" fill-opacity="0.25" stroke="#3a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="105" y="420" text-anchor="middle" fill="#5aaa5a" font-size="10" font-weight="700">SCHEDULER</text>
  <text x="105" y="436" text-anchor="middle" fill="#4a7a4a" font-size="7.5">30s poll · exp backoff retry</text>
  <text x="105" y="449" text-anchor="middle" fill="#4a7a4a" font-size="7.5">daily · cron · interval</text>

  <!-- Plugins -->
  <rect x="20" y="460" width="170" height="44" rx="10" fill="#1a2a1a" fill-opacity="0.25" stroke="#3a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="105" y="480" text-anchor="middle" fill="#5aaa5a" font-size="10" font-weight="700">PLUGINS</text>
  <text x="105" y="495" text-anchor="middle" fill="#4a7a4a" font-size="8">JS / ESM / npm packages</text>

  <!-- External services -->
  <rect x="206" y="398" width="170" height="52" rx="10" fill="#1a1a2a" fill-opacity="0.25" stroke="#5a6a8a" stroke-width="1" filter="url(#sh)"/>
  <text x="291" y="418" text-anchor="middle" fill="#7a9ac0" font-size="10" font-weight="700">EXTERNAL SERVICES</text>
  <text x="291" y="435" text-anchor="middle" fill="#5a7a9a" font-size="8">SearXNG (search)</text>
  <text x="291" y="448" text-anchor="middle" fill="#5a7a9a" font-size="8">Mailgun · Telegram</text>

  <!-- SQLite -->
  <rect x="586" y="265" width="178" height="108" rx="10" fill="#2a1a10" fill-opacity="0.25" stroke="#8a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="675" y="287" text-anchor="middle" fill="#cca86a" font-size="10" font-weight="700">SQLITE  (WAL mode)</text>
  <text x="675" y="305" text-anchor="middle" fill="#7a6a4a" font-size="7.5">sessions · messages (tool_results)</text>
  <text x="675" y="319" text-anchor="middle" fill="#7a6a4a" font-size="7.5">memory_entries · knowledge_chunks</text>
  <text x="675" y="333" text-anchor="middle" fill="#7a6a4a" font-size="7.5">background_tasks · task_executions</text>
  <text x="675" y="347" text-anchor="middle" fill="#7a6a4a" font-size="7.5">tool_calls (audit) · FTS5</text>
  <text x="675" y="361" text-anchor="middle" fill="#7a6a4a" font-size="7.5">500-entry embedding cache (LRU)</text>

  <!-- Agent Loop → SQLite arrow (simple, clear of boxes) -->
  <line x1="508" y1="200" x2="675" y2="260" stroke="#cca86a" stroke-width="0.8" opacity="0.3" marker-end="url(#ad)" stroke-dasharray="4,3"/>

  <!-- Agent Loop → Tools/Scheduler/Plugins arrow -->
  <line x1="238" y1="186" x2="195" y2="186" stroke="#5aaa5a" stroke-width="0.8" opacity="0.3"/>
  <line x1="195" y1="186" x2="195" y2="395" stroke="#5aaa5a" stroke-width="0.8" opacity="0.3"/>
  <line x1="105" y1="395" x2="195" y2="395" stroke="#5aaa5a" stroke-width="0.8" opacity="0.3" marker-end="url(#ag)"/>

</svg>

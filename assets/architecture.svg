<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1420"/>
      <stop offset="100%" stop-color="#161c2e"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="ar" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#0098db"/>
    </marker>
    <marker id="ap" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#9a6ae0"/>
    </marker>
  </defs>

  <rect width="780" height="500" rx="12" fill="url(#bg)"/>

  <text x="390" y="28" text-anchor="middle" fill="#6a7d9a" font-size="10" font-weight="600" letter-spacing="4">LOCALCLAW · ARCHITECTURE</text>

  <!-- ══════════════════ ROW 1 ══════════════════ -->

  <!-- Client -->
  <rect x="18" y="48" width="160" height="78" rx="10" fill="#0098db" fill-opacity="0.08" stroke="#0098db" stroke-width="1" filter="url(#sh)"/>
  <text x="98" y="70" text-anchor="middle" fill="#0098db" font-size="11" font-weight="700">CLIENT</text>
  <text x="98" y="88" text-anchor="middle" fill="#8899b8" font-size="9">Angular 20 SPA</text>
  <text x="98" y="104" text-anchor="middle" fill="#6a7d9a" font-size="7.5">WebSocket · Widgets · 2 themes</text>

  <!-- arrow Client → Server -->
  <line x1="180" y1="79" x2="220" y2="79" stroke="#0098db" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- arrow Server → Client (no marker = bidirectional via second line) -->
  <line x1="220" y1="89" x2="180" y2="89" stroke="#0098db" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Express Server group -->
  <rect x="222" y="40" width="336" height="186" rx="10" fill="#1a2845" fill-opacity="0.12" stroke="#2a5a8a" stroke-width="1" filter="url(#sh)"/>
  <text x="390" y="58" text-anchor="middle" fill="#3a7acc" font-size="11" font-weight="700">EXPRESS SERVER  :4173</text>

  <rect x="236" y="72" width="152" height="40" rx="5" fill="#1e3050" stroke="#2a5a8a" stroke-width="0.5"/>
  <text x="312" y="89" text-anchor="middle" fill="#7a9ac0" font-size="9" font-weight="600">Auth</text>
  <text x="312" y="103" text-anchor="middle" fill="#5a7a9a" font-size="7">Bearer token</text>

  <rect x="396" y="72" width="150" height="40" rx="5" fill="#1e3050" stroke="#2a5a8a" stroke-width="0.5"/>
  <text x="471" y="89" text-anchor="middle" fill="#7a9ac0" font-size="9" font-weight="600">WebSocket</text>
  <text x="471" y="103" text-anchor="middle" fill="#5a7a9a" font-size="7">Streaming + keepalive</text>

  <rect x="236" y="118" width="310" height="34" rx="5" fill="#1e3050" stroke="#2a5a8a" stroke-width="0.5"/>
  <text x="391" y="134" text-anchor="middle" fill="#7a9ac0" font-size="9" font-weight="600">REST API</text>
  <text x="391" y="147" text-anchor="middle" fill="#5a7a9a" font-size="7">sessions · messages · uploads · knowledge · background-tasks</text>

  <rect x="236" y="158" width="310" height="36" rx="5" fill="#1a2840" stroke="#0098db" stroke-width="0.6"/>
  <text x="391" y="174" text-anchor="middle" fill="#0098db" font-size="9" font-weight="700">Agent Loop  (max 15 iterations)</text>
  <text x="391" y="188" text-anchor="middle" fill="#5a7a9a" font-size="7">Pre-plan · Planner · Function calling · Classifier · Failure handling</text>

  <rect x="236" y="200" width="70" height="16" rx="3" fill="#142030" stroke="#2a5a8a" stroke-width="0.3"/>
  <text x="271" y="211" text-anchor="middle" fill="#6a8aaa" font-size="7">prompts</text>
  <rect x="310" y="200" width="70" height="16" rx="3" fill="#142030" stroke="#2a5a8a" stroke-width="0.3"/>
  <text x="345" y="211" text-anchor="middle" fill="#6a8aaa" font-size="7">classifier</text>
  <rect x="384" y="200" width="70" height="16" rx="3" fill="#142030" stroke="#2a5a8a" stroke-width="0.3"/>
  <text x="419" y="211" text-anchor="middle" fill="#6a8aaa" font-size="7">planner</text>
  <rect x="458" y="200" width="78" height="16" rx="3" fill="#142030" stroke="#2a5a8a" stroke-width="0.3"/>
  <text x="497" y="211" text-anchor="middle" fill="#6a8aaa" font-size="7">opencode-bridge</text>

  <!-- arrow Server ↔ Ollama -->
  <line x1="560" y1="114" x2="586" y2="114" stroke="#9a6ae0" stroke-width="1.5" marker-end="url(#ap)"/>
  <line x1="586" y1="125" x2="560" y2="125" stroke="#9a6ae0" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- Ollama -->
  <rect x="588" y="48" width="178" height="78" rx="10" fill="#2a1a3a" fill-opacity="0.22" stroke="#5a3a8a" stroke-width="1" filter="url(#sh)"/>
  <text x="677" y="70" text-anchor="middle" fill="#9a6ae0" font-size="10" font-weight="700">OLLAMA</text>
  <text x="677" y="87" text-anchor="middle" fill="#7a5a9a" font-size="7.5">Chat LLM qwen2.5:3b</text>
  <text x="677" y="101" text-anchor="middle" fill="#7a5a9a" font-size="7.5">Embeddings nomic-embed-text</text>
  <text x="677" y="115" text-anchor="middle" fill="#7a5a9a" font-size="7.5">Image gen flux/sd</text>

  <!-- OpenCode -->
  <rect x="588" y="134" width="178" height="52" rx="10" fill="#1a2a1a" fill-opacity="0.22" stroke="#5a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="677" y="156" text-anchor="middle" fill="#8ab84a" font-size="10" font-weight="700">OPENCODE CLI</text>
  <text x="677" y="172" text-anchor="middle" fill="#6a8a4a" font-size="7.5">Pre-planning (2 rounds)</text>
  <text x="677" y="185" text-anchor="middle" fill="#6a8a4a" font-size="7.5">Dynamic tool (fallback)</text>

  <!-- ══════════════════ ROW 2 ══════════════════ -->

  <line x1="18" y1="240" x2="766" y2="240" stroke="#2a5a8a" stroke-width="0.4" opacity="0.15"/>

  <!-- Tools -->
  <rect x="18" y="256" width="170" height="124" rx="10" fill="#1a2a1a" fill-opacity="0.22" stroke="#3a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="103" y="278" text-anchor="middle" fill="#5aaa5a" font-size="10" font-weight="700">TOOLS  (14 built-in)</text>
  <text x="103" y="295" text-anchor="middle" fill="#3a6a3a" font-size="7.5">web_fetch  ·  fetch_news</text>
  <text x="103" y="309" text-anchor="middle" fill="#3a6a3a" font-size="7.5">weather  ·  generate_image</text>
  <text x="103" y="323" text-anchor="middle" fill="#3a6a3a" font-size="7.5">read_file  ·  write_file</text>
  <text x="103" y="337" text-anchor="middle" fill="#3a6a3a" font-size="7.5">run_bash  ·  opencode_task</text>
  <text x="103" y="351" text-anchor="middle" fill="#3a6a3a" font-size="7.5">send_email  ·  telegram</text>
  <text x="103" y="365" text-anchor="middle" fill="#3a6a3a" font-size="7.5">schedule_task  ·  search_knowledge</text>
  <text x="103" y="379" text-anchor="middle" fill="#3a6a3a" font-size="7.5">create_tool  ·  browser_automation</text>

  <!-- Scheduler -->
  <rect x="18" y="388" width="170" height="50" rx="10" fill="#1a2a1a" fill-opacity="0.22" stroke="#3a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="103" y="408" text-anchor="middle" fill="#5aaa5a" font-size="10" font-weight="700">SCHEDULER</text>
  <text x="103" y="424" text-anchor="middle" fill="#4a7a4a" font-size="7.5">30s poll · exp backoff retry</text>
  <text x="103" y="437" text-anchor="middle" fill="#4a7a4a" font-size="7.5">daily · cron · interval</text>

  <!-- External services -->
  <rect x="204" y="388" width="170" height="50" rx="10" fill="#1a1a2a" fill-opacity="0.22" stroke="#5a6a8a" stroke-width="1" filter="url(#sh)"/>
  <text x="289" y="408" text-anchor="middle" fill="#7a9ac0" font-size="10" font-weight="700">EXTERNAL SERVICES</text>
  <text x="289" y="425" text-anchor="middle" fill="#5a7a9a" font-size="8">SearXNG · Mailgun · Telegram</text>

  <!-- Plugins -->
  <rect x="390" y="388" width="170" height="50" rx="10" fill="#1a2a1a" fill-opacity="0.22" stroke="#3a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="475" y="408" text-anchor="middle" fill="#5aaa5a" font-size="10" font-weight="700">PLUGINS</text>
  <text x="475" y="425" text-anchor="middle" fill="#4a7a4a" font-size="8">JS / ESM / npm packages</text>

  <!-- SQLite -->
  <rect x="204" y="256" width="356" height="118" rx="10" fill="#2a1a10" fill-opacity="0.22" stroke="#8a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="382" y="278" text-anchor="middle" fill="#cca86a" font-size="10" font-weight="700">SQLITE</text>
  <text x="382" y="296" text-anchor="middle" fill="#7a6a4a" font-size="7.5">sessions · messages (tool_results) · memory_entries</text>
  <text x="382" y="312" text-anchor="middle" fill="#7a6a4a" font-size="7.5">knowledge_documents · knowledge_chunks</text>
  <text x="382" y="328" text-anchor="middle" fill="#7a6a4a" font-size="7.5">background_tasks · task_executions</text>
  <text x="382" y="344" text-anchor="middle" fill="#7a6a4a" font-size="7.5">tool_calls (audit) · FTS5 indexes</text>
  <text x="382" y="360" text-anchor="middle" fill="#7a6a4a" font-size="7.5">500-entry embedding cache (LRU)</text>

</svg>

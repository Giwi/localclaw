<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 540" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1420"/>
      <stop offset="100%" stop-color="#161c2e"/>
    </linearGradient>
    <linearGradient id="accentG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0098db"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="shS">
      <feDropShadow dx="0" dy="0.5" stdDeviation="1" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <marker id="aR" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0098db" opacity="0.6"/>
    </marker>
    <marker id="aL" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5a7a9a" opacity="0.5"/>
    </marker>
    <marker id="aG" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5aaa5a" opacity="0.5"/>
    </marker>
  </defs>

  <rect width="780" height="540" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="390" y="32" text-anchor="middle" fill="#8899b8" font-size="11" font-weight="600" letter-spacing="3" text-transform="uppercase">LOCALCLAW ARCHITECTURE</text>

  <!-- ── LEFT COLUMN ── -->

  <!-- Client -->
  <rect x="24" y="52" width="164" height="86" rx="10" fill="#0098db" fill-opacity="0.08" stroke="#0098db" stroke-width="1" filter="url(#sh)"/>
  <text x="106" y="74" text-anchor="middle" fill="#0098db" font-size="10" font-weight="700">CLIENT</text>
  <text x="106" y="92" text-anchor="middle" fill="#8899b8" font-size="9">Angular 20 SPA</text>
  <text x="106" y="108" text-anchor="middle" fill="#6a7d9a" font-size="8">WebSocket · Signals</text>
  <text x="106" y="124" text-anchor="middle" fill="#6a7d9a" font-size="8">Widgets · 2 themes</text>

  <!-- Arrow Client → Server -->
  <line x1="188" y1="95" x2="222" y2="95" stroke="#0098db" stroke-width="1.2" marker-end="url(#aR)"/>
  <line x1="222" y1="82" x2="188" y2="82" stroke="#0098db" stroke-width="1.2" marker-end="url(#aR)"/>
  <text x="205" y="78" text-anchor="middle" fill="#0098db" font-size="7" opacity="0.5">ws</text>

  <!-- Server border -->
  <rect x="224" y="40" width="326" height="198" rx="10" fill="#1a2845" fill-opacity="0.2" stroke="#2a5a8a" stroke-width="1" filter="url(#sh)"/>
  <text x="387" y="60" text-anchor="middle" fill="#3a7acc" font-size="10" font-weight="700">EXPRESS SERVER :4173</text>

  <!-- Auth + WS side by side -->
  <rect x="236" y="72" width="148" height="42" rx="6" fill="#1e3050" stroke="#2a5a8a" stroke-width="0.5"/>
  <text x="310" y="90" text-anchor="middle" fill="#7a9ac0" font-size="9" font-weight="600">Auth</text>
  <text x="310" y="105" text-anchor="middle" fill="#5a7a9a" font-size="8">Bearer token middleware</text>

  <rect x="392" y="72" width="146" height="42" rx="6" fill="#1e3050" stroke="#2a5a8a" stroke-width="0.5"/>
  <text x="465" y="90" text-anchor="middle" fill="#7a9ac0" font-size="9" font-weight="600">WebSocket</text>
  <text x="465" y="105" text-anchor="middle" fill="#5a7a9a" font-size="8">Stream + keepalive</text>

  <!-- REST API -->
  <rect x="236" y="120" width="302" height="36" rx="6" fill="#1e3050" stroke="#2a5a8a" stroke-width="0.5"/>
  <text x="387" y="136" text-anchor="middle" fill="#7a9ac0" font-size="9" font-weight="600">REST API</text>
  <text x="387" y="149" text-anchor="middle" fill="#5a7a9a" font-size="7.5">sessions · messages · uploads · knowledge · background-tasks</text>

  <!-- Agent Loop -->
  <rect x="236" y="162" width="302" height="38" rx="6" fill="#1e3050" stroke="#0098db" stroke-width="0.8"/>
  <text x="387" y="178" text-anchor="middle" fill="#0098db" font-size="9" font-weight="700">Agent Loop (max 15 iters)</text>
  <text x="387" y="192" text-anchor="middle" fill="#5a7a9a" font-size="7.5">Pre-plan · Planner · Function calling · Classifier · Failure handling</text>

  <!-- Agent sub-modules -->
  <rect x="236" y="205" width="70" height="16" rx="3" fill="#1a2840" stroke="#2a5a8a" stroke-width="0.3"/>
  <text x="271" y="216" text-anchor="middle" fill="#6a8aaa" font-size="7">prompts</text>
  <rect x="310" y="205" width="70" height="16" rx="3" fill="#1a2840" stroke="#2a5a8a" stroke-width="0.3"/>
  <text x="345" y="216" text-anchor="middle" fill="#6a8aaa" font-size="7">classifier</text>
  <rect x="384" y="205" width="70" height="16" rx="3" fill="#1a2840" stroke="#2a5a8a" stroke-width="0.3"/>
  <text x="419" y="216" text-anchor="middle" fill="#6a8aaa" font-size="7">planner</text>
  <rect x="458" y="205" width="70" height="16" rx="3" fill="#1a2840" stroke="#2a5a8a" stroke-width="0.3"/>
  <text x="493" y="216" text-anchor="middle" fill="#6a8aaa" font-size="7">opencode-bridge</text>

  <!-- ── CONNECTIONS from server to backend ── -->

  <!-- Server → Tools arrow -->
  <line x1="236" y1="230" x2="188" y2="230" stroke="#5aaa5a" stroke-width="1" opacity="0.4"/>
  <line x1="188" y1="230" x2="188" y2="272" stroke="#5aaa5a" stroke-width="1" opacity="0.4"/>
  <line x1="106" y1="272" x2="188" y2="272" stroke="#5aaa5a" stroke-width="1" opacity="0.4" marker-end="url(#aG)"/>

  <!-- Server → Ollama arrow -->
  <line x1="550" y1="150" x2="584" y2="150" stroke="#9a6ae0" stroke-width="1" opacity="0.4" marker-end="url(#aR)"/>
  <line x1="584" y1="138" x2="550" y2="138" stroke="#9a6ae0" stroke-width="1" opacity="0.4"/>

  <!-- Server → SQLite arrow -->
  <line x1="436" y1="238" x2="436" y2="268" stroke="#cca86a" stroke-width="1" opacity="0.4"/>
  <line x1="436" y1="268" x2="680" y2="268" stroke="#cca86a" stroke-width="1" opacity="0.4"/>
  <line x1="664" y1="416" x2="664" y2="268" stroke="#cca86a" stroke-width="1" opacity="0.4"/>
  <line x1="680" y1="268" x2="680" y2="438" stroke="#cca86a" stroke-width="1" opacity="0.4" marker-end="url(#aL)"/>

  <!-- Server → Scheduler arrow -->
  <line x1="288" y1="238" x2="288" y2="316" stroke="#5aaa5a" stroke-width="1" opacity="0.4"/>
  <line x1="106" y1="316" x2="288" y2="316" stroke="#5aaa5a" stroke-width="1" opacity="0.4"/>
  <line x1="106" y1="316" x2="106" y2="404" stroke="#5aaa5a" stroke-width="1" opacity="0.4" marker-end="url(#aG)"/>

  <!-- Server → External arrow -->
  <line x1="332" y1="238" x2="332" y2="423" stroke="#7a9ac0" stroke-width="1" opacity="0.4"/>
  <line x1="220" y1="423" x2="332" y2="423" stroke="#7a9ac0" stroke-width="1" opacity="0.4" marker-end="url(#aL)"/>

  <!-- ── RIGHT COLUMN ── -->

  <!-- Ollama -->
  <rect x="586" y="60" width="178" height="78" rx="10" fill="#2a1a3a" fill-opacity="0.3" stroke="#5a3a8a" stroke-width="1" filter="url(#sh)"/>
  <text x="675" y="82" text-anchor="middle" fill="#9a6ae0" font-size="10" font-weight="700">OLLAMA</text>
  <text x="675" y="98" text-anchor="middle" fill="#7a5a9a" font-size="8">Chat LLM (qwen2.5:3b)</text>
  <text x="675" y="112" text-anchor="middle" fill="#7a5a9a" font-size="8">Embeddings (nomic-embed-text)</text>
  <text x="675" y="126" text-anchor="middle" fill="#7a5a9a" font-size="8">Image generation (flux/sd)</text>

  <!-- OpenCode -->
  <rect x="586" y="146" width="178" height="58" rx="10" fill="#1a2a1a" fill-opacity="0.3" stroke="#5a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="675" y="168" text-anchor="middle" fill="#8ab84a" font-size="10" font-weight="700">OPENCODE CLI</text>
  <text x="675" y="183" text-anchor="middle" fill="#6a8a4a" font-size="8">Pre-planning (2 rounds × 3 prompts)</text>
  <text x="675" y="196" text-anchor="middle" fill="#6a8a4a" font-size="8">Dynamic tool creation (fallback)</text>

  <!-- ── BOTTOM ROW ── -->

  <!-- Tools -->
  <rect x="24" y="274" width="164" height="128" rx="10" fill="#1a2a1a" fill-opacity="0.3" stroke="#3a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="106" y="296" text-anchor="middle" fill="#5aaa5a" font-size="10" font-weight="700">TOOLS (14 built-in)</text>
  <text x="106" y="314" text-anchor="middle" fill="#3a6a3a" font-size="8">web_fetch · fetch_news</text>
  <text x="106" y="328" text-anchor="middle" fill="#3a6a3a" font-size="8">weather (widget)</text>
  <text x="106" y="342" text-anchor="middle" fill="#3a6a3a" font-size="8">read_file · write_file</text>
  <text x="106" y="356" text-anchor="middle" fill="#3a6a3a" font-size="8">run_bash · generate_image</text>
  <text x="106" y="370" text-anchor="middle" fill="#3a6a3a" font-size="8">send_email · telegram</text>
  <text x="106" y="384" text-anchor="middle" fill="#3a6a3a" font-size="8">schedule_task · opencode_task</text>
  <text x="106" y="398" text-anchor="middle" fill="#3a6a3a" font-size="8">create_tool · search_knowledge</text>

  <!-- Scheduler -->
  <rect x="24" y="408" width="164" height="50" rx="10" fill="#1a2a1a" fill-opacity="0.3" stroke="#3a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="106" y="428" text-anchor="middle" fill="#5aaa5a" font-size="10" font-weight="700">SCHEDULER</text>
  <text x="106" y="443" text-anchor="middle" fill="#4a7a4a" font-size="8">30s poll · exp. backoff retry</text>
  <text x="106" y="454" text-anchor="middle" fill="#4a7a4a" font-size="8">daily · cron · interval</text>

  <!-- Plugins -->
  <rect x="24" y="464" width="164" height="44" rx="10" fill="#1a2a1a" fill-opacity="0.3" stroke="#3a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="106" y="483" text-anchor="middle" fill="#5aaa5a" font-size="10" font-weight="700">PLUGINS</text>
  <text x="106" y="497" text-anchor="middle" fill="#4a7a4a" font-size="8">JS/ESM · npm packages</text>

  <!-- External services -->
  <rect x="222" y="408" width="166" height="50" rx="10" fill="#1a1a2a" fill-opacity="0.3" stroke="#5a6a8a" stroke-width="1" filter="url(#sh)"/>
  <text x="305" y="428" text-anchor="middle" fill="#7a9ac0" font-size="10" font-weight="700">EXTERNAL SERVICES</text>
  <text x="305" y="445" text-anchor="middle" fill="#5a7a9a" font-size="8">SearXNG · Mailgun · Telegram</text>

  <!-- SQLite -->
  <rect x="586" y="408" width="178" height="100" rx="10" fill="#2a1a10" fill-opacity="0.3" stroke="#8a6a3a" stroke-width="1" filter="url(#sh)"/>
  <text x="675" y="430" text-anchor="middle" fill="#cca86a" font-size="10" font-weight="700">SQLITE (WAL mode)</text>
  <text x="675" y="448" text-anchor="middle" fill="#7a6a4a" font-size="8">sessions · messages (tool_results)</text>
  <text x="675" y="462" text-anchor="middle" fill="#7a6a4a" font-size="8">memory_entries · knowledge_chunks</text>
  <text x="675" y="476" text-anchor="middle" fill="#7a6a4a" font-size="8">background_tasks · task_executions</text>
  <text x="675" y="490" text-anchor="middle" fill="#7a6a4a" font-size="8">tool_calls (audit) · FTS5 indexes</text>
  <text x="675" y="504" text-anchor="middle" fill="#7a6a4a" font-size="8">500-entry embedding cache (LRU)</text>

  <!-- Column separators -->
  <line x1="200" y1="42" x2="200" y2="252" stroke="#2a5a8a" stroke-width="0.3" opacity="0.2"/>
  <line x1="576" y1="42" x2="576" y2="252" stroke="#2a5a8a" stroke-width="0.3" opacity="0.2"/>
  <line x1="24" y1="262" x2="764" y2="262" stroke="#2a5a8a" stroke-width="0.5" opacity="0.3"/>
</svg>

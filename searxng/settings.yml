# SearXNG settings for localclaw
# See https://docs.searxng.org/admin/settings/

use_default_settings: true

general:
  instance_name: "localclaw search"
  privacypolicy_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "change_this_to_a_random_secret_key"
  limiter: false
  image_proxy: true
  method: "GET"

ui:
  static_use_hash: true
  default_theme: simple
  default_locale: ""
  results_on_new_tab: true

engines:
  - name: google
    disabled: true
  - name: bing
    disabled: true
  - name: duckduckgo
    use_mobile: true
  - name: wikipedia
  - name: wikidata
  - name: wikimedia
  - name: pixabay
  - name: flickr
  - name: deviantart
  - name: Gettyimages
  - name: openverse

outgoing:
  request_timeout: 5.0
  max_request_timeout: 10.0
  useragent_suffix: ""

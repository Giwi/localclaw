<div class="d-flex" style="height: 100dvh;">

  <!-- Toasts -->
  <div style="position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;">
    @for (toast of toasts(); track toast.id) {
      <div
        style="pointer-events:auto;padding:12px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;animation:fadeIn .25s ease;max-width:360px;cursor:pointer;position:relative;overflow:hidden;"
        [style]="toast.type === 'error' ? 'background:#ef4444;color:#fff;' : toast.type === 'success' ? 'background:#22c55e;color:#fff;' : 'background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border-color);'"
        (click)="removeToast(toast.id)"
      >
        <i class="bi" [class.bi-x-circle]="toast.type === 'error'" [class.bi-check-circle]="toast.type === 'success'" [class.bi-info-circle]="toast.type === 'info'"></i>
        {{ toast.message }}
        <div style="position:absolute;bottom:0;left:0;height:2px;background:rgba(255,255,255,.5);animation:toastShrink 4s linear forwards;border-radius:0 0 0 var(--radius-sm);"></div>
      </div>
    }
  </div>

  <app-sidebar
    [sidebarOpen]="sidebarOpen()"
    [sessions]="sessions()"
    [currentSession]="currentSession()"
    [sidebarView]="sidebarView()"
    [backgroundTasks]="backgroundTasks()"
    [loadingTasks]="loadingTasks()"
    [renamingId]="renamingId()"
    [renameInput]="renameInput()"
    [selectedSessionIndex]="selectedSessionIndex()"
    [currentTheme]="currentTheme()"
    (newSession)="newSession()"
    (selectSession)="selectSession($event)"
    (deleteSession)="deleteSession($event.event, $event.id)"
    (startRename)="startRename($event)"
    (commitRename)="commitRename($event)"
    (cancelRename)="cancelRename()"
    (switchSidebarView)="switchSidebarView($event)"
    (toggleTheme)="toggleTheme()"
    (toggleTask)="toggleTask($event)"
    (runTask)="runTask($event)"
    (deleteBgTask)="deleteBgTask($event.event, $event.task)"
    (onSessionKeydown)="onSessionKeydown($event)"
    (renameInputChange)="renameInput.set($event)"
  ></app-sidebar>

  <app-chat-area
    [currentSession]="currentSession()"
    [messages]="messages()"
    [toolEvents]="toolEvents()"
    [loading]="loading()"
    [statusMsg]="statusMsg()"
    [input]="input()"
    [editingMsg]="editingMsg()"
    [dragOver]="dragOver()"
    [sidebarOpen]="sidebarOpen()"
    (toggleSidebar)="toggleSidebar()"
    (sendMessage)="send()"
    (editMessage)="editMessage($event)"
    (cancelEdit)="cancelEdit()"
    (stopGeneration)="stopGeneration()"
    (startRename)="startRename($event)"
    (deleteCurrent)="deleteCurrent()"
    (toggleToolEvent)="toggleToolEvent($event)"
    (copyText)="copyText($event)"
    (uploadFile)="uploadFile($event)"
    (dragOverChange)="dragOver.set($event)"
    (dropFile)="uploadFileDirect($event)"
    (newSession)="newSession()"
    (inputChange)="input.set($event)"
  ></app-chat-area>

</div>

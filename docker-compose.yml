services:
  ollama:
    image: ollama/ollama:latest
    container_name: localclaw-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: localclaw-searxng
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-change_this_to_a_random_secret_key}
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped

  localclaw:
    build: .
    container_name: localclaw
    ports:
      - "${LOCALCLAW_PORT:-4173}:4173"
    environment:
      - LOCALCLAW_OLLAMA_URL=http://ollama:11434
      - LOCALCLAW_SEARXNG_URL=http://searxng:8080
      - LOCALCLAW_MODEL=${LOCALCLAW_MODEL:-ollama/qwen2.5:7b-instruct-q3_K_M}
      - LOCALCLAW_EMBEDDING_MODEL=${LOCALCLAW_EMBEDDING_MODEL:-nomic-embed-text}
      - LOCALCLAW_DATA_DIR=/data
      - LOCALCLAW_PORT=4173
      - LOCALCLAW_OPENCODE_BIN=
      - LOCALCLAW_SANDBOX_ENABLED=false
    volumes:
      - localclaw_data:/data
    depends_on:
      - ollama
      - searxng
    restart: unless-stopped

volumes:
  ollama_data:
  localclaw_data:
